<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<title>
🐭 Cheese Heist
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>🐭 CHEESE HEIST 🧀</h1>

<h2>หนูขโมยชีส</h2>



<div class="box">

<h3>🏠 ห้องเล่น</h3>


<input id="playerName"
placeholder="ชื่อหนู">


<br>


<button onclick="createRoom()">
👑 สร้างห้อง
</button>


<button onclick="joinRoom()">
🐭 เข้าห้อง
</button>



<p>
รหัสห้อง:
<span id="roomID">
-
</span>
</p>



<p id="userStatus">
-
</p>


<p>
ผู้เล่น:
<span id="playerCount">
0
</span>
/8
</p>


</div>





<div class="box">

<h3 id="phase">
รอเริ่มเกม
</h3>


<button onclick="startGame()">
🌙 เริ่มเกม
</button>



<button onclick="nextNight()">
⏰ เวลาถัดไป
</button>


<button onclick="stealCheese()">
🧀 ขโมยชีส
</button>


<p id="nightStatus">
-
</p>


</div>






<div class="box">

<h3>
🃏 การ์ดของฉัน
</h3>


<select id="myPlayer">

<option>
เลือกชื่อ
</option>

</select>


<br>


<button onclick="openCard()">
เปิดการ์ด
</button>



<div id="myCard">

🃏 ปิดอยู่

</div>


</div>







<div class="box">


<h3>
☀️ กลางวัน
</h3>


<select id="voteSelect">

<option>
เลือกผู้ต้องสงสัย
</option>

</select>


<br>


<button onclick="votePlayer()">
🗳️ โหวต
</button>



<div id="voteResult">

-

</div>


</div>





<script src="game.js"></script>

</body>

</html>
