<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<title>
🐭 Cheese Heist
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>🐭 CHEESE HEIST 🧀</h1>

<h2>หนูขโมยชีส</h2>



<div class="box">

<h3>🐭 ห้องเล่น</h3>


<input 
id="playerName"
placeholder="ใส่ชื่อหนู">


<br><br>


<button onclick="createRoom()">
สร้างห้อง
</button>


<button onclick="joinRoom()">
เข้าห้อง
</button>



<p>
รหัสห้อง:
<span id="roomID">
-
</span>
</p>


<p>
ผู้เล่น:
<span id="playerCount">
0
</span>
/8
</p>


</div>





<div class="box">


<h3>
สถานะเกม
</h3>


<h2 id="phase">
รอเริ่มเกม
</h2>


<button onclick="startGame()">
🌙 เริ่มเกม
</button>


</div>





<div class="box">


<h3>
🃏 ข้อมูลบทบาท (ทดสอบ)
</h3>


<div id="roleList">

ยังไม่มีข้อมูล

</div>


</div>





<script src="game.js"></script>


</body>

</html>
