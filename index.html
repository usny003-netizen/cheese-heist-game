<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<title>
🐭 Cheese Heist
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>🐭 CHEESE HEIST 🧀</h1>

<h2>หนูขโมยชีส</h2>



<div class="box">

<h3>🐭 Lobby</h3>


<input 
id="playerName"
placeholder="ชื่อหนูของคุณ">


<br>


<button onclick="createRoom()">
สร้างห้อง
</button>


<button onclick="joinRoom()">
เข้าห้อง
</button>


<p>
รหัสห้อง:
<span id="roomID">
-
</span>
</p>


<p>
ผู้เล่น:
<span id="players">
0
</span>
/8
</p>


</div>





<div class="box">


<h3 id="phase">
รอเริ่มเกม
</h3>


<h2 id="clock">
🌙 -
</h2>


<p id="awake">
-
</p>



<button onclick="startGame()">
🌙 เริ่มเกม
</button>



<button onclick="nextNight()">
⏰ เวลาถัดไป
</button>



<button onclick="stealCheese()">
🧀 ขโมยชีส
</button>



</div>





<div class="box">


<h3>
สถานะเกม
</h3>


<div id="status">

-

</div>


</div>



<script src="game.js"></script>


</body>

</html>
