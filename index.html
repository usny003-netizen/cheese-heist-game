<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<title>
🐭 Cheese Heist
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<h1>🐭 CHEESE HEIST 🧀</h1>

<h2>หนูขโมยชีส</h2>



<div class="box">

<h3>🐭 Lobby</h3>

<input id="playerName"
placeholder="ชื่อหนู">


<br>

<button onclick="createRoom()">
สร้างห้อง
</button>


<button onclick="joinRoom()">
เข้าห้อง
</button>


<p>
รหัสห้อง:
<span id="roomID">-</span>
</p>


<p>
ผู้เล่น:
<span id="playerCount">0</span>/8
</p>


</div>





<div class="box">

<h3 id="phase">
รอเริ่มเกม
</h3>


<button onclick="startGame()">
🌙 เริ่มเกม
</button>


<button onclick="nextNight()">
⏰ เวลาถัดไป
</button>


<button onclick="stealCheese()">
🧀 ขโมยชีส
</button>


<p id="nightStatus">
-
</p>


</div>





<div class="box">

<h3>
🃏 การ์ดบทบาท (ทดสอบ)
</h3>


<div id="roleList">
ยังไม่มีข้อมูล
</div>


</div>





<div class="box">

<h3>
☀️ กลางวัน
</h3>


<p id="dayStatus">
ยังไม่เช้า
</p>


<select id="voteSelect">

<option>
เลือกผู้ต้องสงสัย
</option>


</select>


<br>


<button onclick="votePlayer()">
🗳️ โหวต
</button>


<h4>
ผลโหวต
</h4>


<div id="voteResult">
-
</div>


</div>




<script src="game.js"></script>


</body>

</html>
